<svg viewBox="0 0 960 460" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <rect width="960" height="460" fill="#0f172a"/>

  <text x="480" y="45" text-anchor="middle" fill="#f8fafc" font-size="26" font-weight="700">Three Levels of Artificial Intelligence</text>
  <text x="480" y="70" text-anchor="middle" fill="#94a3b8" font-size="14">Based on the framework used in Learn Bright (2024), Artefact 1</text>

  <!-- ANI panel -->
  <g>
    <rect x="40" y="100" width="270" height="310" rx="14" fill="#134e4a" stroke="#2dd4bf" stroke-width="2"/>
    <circle cx="175" cy="160" r="34" fill="#0f766e"/>
    <text x="175" y="168" text-anchor="middle" fill="#5eead4" font-size="28" font-weight="700">1</text>
    <text x="175" y="220" text-anchor="middle" fill="#f0fdfa" font-size="20" font-weight="700">ANI</text>
    <text x="175" y="242" text-anchor="middle" fill="#99f6e4" font-size="13">Artificial Narrow Intelligence</text>
    <text x="175" y="275" text-anchor="middle" fill="#e2f8f5" font-size="12">Trained for one task or a</text>
    <text x="175" y="292" text-anchor="middle" fill="#e2f8f5" font-size="12">narrow set of tasks. Cannot</text>
    <text x="175" y="309" text-anchor="middle" fill="#e2f8f5" font-size="12">transfer skill outside its</text>
    <text x="175" y="326" text-anchor="middle" fill="#e2f8f5" font-size="12">training domain.</text>
    <text x="175" y="360" text-anchor="middle" fill="#5eead4" font-size="12" font-weight="600">Exists today</text>
    <text x="175" y="380" text-anchor="middle" fill="#ccfbf1" font-size="11">e.g. Duolingo's AI, Siri,</text>
    <text x="175" y="396" text-anchor="middle" fill="#ccfbf1" font-size="11">chatbots, recommender systems</text>
  </g>

  <!-- AGI panel -->
  <g>
    <rect x="345" y="100" width="270" height="310" rx="14" fill="#1e3a8a" stroke="#60a5fa" stroke-width="2"/>
    <circle cx="480" cy="160" r="34" fill="#1d4ed8"/>
    <text x="480" y="168" text-anchor="middle" fill="#93c5fd" font-size="28" font-weight="700">2</text>
    <text x="480" y="220" text-anchor="middle" fill="#eff6ff" font-size="20" font-weight="700">AGI</text>
    <text x="480" y="242" text-anchor="middle" fill="#bfdbfe" font-size="13">Artificial General Intelligence</text>
    <text x="480" y="275" text-anchor="middle" fill="#e2ecfd" font-size="12">Human-level reasoning that</text>
    <text x="480" y="292" text-anchor="middle" fill="#e2ecfd" font-size="12">can transfer learning across</text>
    <text x="480" y="309" text-anchor="middle" fill="#e2ecfd" font-size="12">many different domains,</text>
    <text x="480" y="326" text-anchor="middle" fill="#e2ecfd" font-size="12">the way a person can.</text>
    <text x="480" y="360" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="600">Not yet achieved</text>
    <text x="480" y="380" text-anchor="middle" fill="#dbeafe" font-size="11">Goal of labs such as</text>
    <text x="480" y="396" text-anchor="middle" fill="#dbeafe" font-size="11">OpenAI, Anthropic, DeepMind</text>
  </g>

  <!-- ASI panel -->
  <g>
    <rect x="650" y="100" width="270" height="310" rx="14" fill="#4c1d95" stroke="#c084fc" stroke-width="2"/>
    <circle cx="785" cy="160" r="34" fill="#6d28d9"/>
    <text x="785" y="168" text-anchor="middle" fill="#d8b4fe" font-size="28" font-weight="700">3</text>
    <text x="785" y="220" text-anchor="middle" fill="#faf5ff" font-size="20" font-weight="700">ASI</text>
    <text x="785" y="242" text-anchor="middle" fill="#e9d5ff" font-size="13">Artificial Superintelligence</text>
    <text x="785" y="275" text-anchor="middle" fill="#f3e8ff" font-size="12">Surpasses the best human</text>
    <text x="785" y="292" text-anchor="middle" fill="#f3e8ff" font-size="12">minds in every field, including</text>
    <text x="785" y="309" text-anchor="middle" fill="#f3e8ff" font-size="12">creativity and social skill.</text>
    <text x="785" y="326" text-anchor="middle" fill="#f3e8ff" font-size="12">Still hypothetical.</text>
    <text x="785" y="360" text-anchor="middle" fill="#d8b4fe" font-size="12" font-weight="600">Theoretical / debated</text>
    <text x="785" y="380" text-anchor="middle" fill="#ede9fe" font-size="11">Central to the safety and</text>
    <text x="785" y="396" text-anchor="middle" fill="#ede9fe" font-size="11">governance debate in this unit</text>
  </g>

  <!-- Arrows showing progression -->
  <path d="M 315 250 L 340 250" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M 620 250 L 645 250" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <text x="480" y="440" text-anchor="middle" fill="#64748b" font-size="12">Increasing generality and capability &#8594;</text>
</svg>
